name: Sync Fork With Upstream

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/WenyuChiou/awesome-agentic-ai-zh.git || true
          git fetch upstream main

      - name: Merge upstream
        run: |
          git checkout main
          git merge --ff-only upstream/main || {
            echo "Fast-forward failed. Resolve manually.";
            exit 1;
          }

      - name: Push updated fork
        run: git push origin main
