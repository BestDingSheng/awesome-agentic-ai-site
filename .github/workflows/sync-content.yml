name: Sync Content

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync content from fork
        run: npm run sync:content
        env:
          REPO_URL: ${{ vars.CONTENT_REPO_URL }}
          REPO_REF: ${{ vars.CONTENT_REPO_REF || 'main' }}

      - name: Validate generated site build
        run: npm run build

      - name: Commit synced content
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: sync content from fork'
